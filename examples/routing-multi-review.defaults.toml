# Example: override multi-review defaults (optional — Rondo built-ins match this if omitted).
# Copy snippets into ~/.rondo/config.toml under [routing.multi_review]
#
# ai-review: --tier best|standard|fast uses the same [providers.*] rows as Rondo:
#   best_model → --tier best, default_model → --tier standard, cheap_model → --tier fast
# See rondo/review_tiers.py and Rondo-REQ-109 reqs 064-067.
#
# Core trio: Gemini + Grok; Mistral for security third opinion; OpenAI not required.

[routing.multi_review]
code-review = ["gemini:flash", "grok:grok-4.3"]
analysis = ["gemini:flash", "grok:grok-4.3"]
research = ["gemini:flash", "grok:grok-4.3"]
security = ["gemini:flash", "grok:grok-4.3", "mistral:mistral-large-latest"]
reasoning = ["gemini:gemini-pro-latest", "mistral:mistral-large-latest"]
