[build-system]
requires = ["setuptools>=68.0"]
build-backend = "setuptools.build_meta"

[project]
name = "rondo"
version = "0.2.0"
description = "Define AI tasks in Python, send them to Claude, get structured results back."
requires-python = ">=3.12"
license = "MIT"
authors = [
    { name = "Mark Hubers" },
]

[project.scripts]
rondo = "rondo.cli:main"

[tool.setuptools.packages.find]
where = ["src"]

[tool.bandit]
# -- B404: subprocess import is required — Rondo's core function is invoking Claude via subprocess
# -- B603: Popen without shell=True is the SAFE pattern (we never use shell=True)
skips = ["B404", "B603"]

[tool.pytest.ini_options]
testpaths = ["tests"]

[tool.coverage.run]
source = ["rondo"]

[tool.coverage.report]
fail_under = 90
show_missing = true
skip_empty = true
