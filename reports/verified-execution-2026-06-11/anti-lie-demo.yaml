name: anti-lie-demo
budget_usd: 1.00
steps:
  - name: real_work
    model: "sonnet"
    tools: "Write,Bash"
    max_turns: 8
    timeout: 300
    add_dir: "/tmp/rondo-anti-lie"
    prompt: "Create the file /tmp/rondo-anti-lie/proof.txt containing the single line: rondo verified this. Then set passed=true."
    verify:
      files: ["/tmp/rondo-anti-lie/proof.txt"]
  - name: claimed_work
    model: "sonnet"
    tools: "Read"
    max_turns: 4
    timeout: 300
    on_fail: continue
    prompt: "Do NOT create any file. Just reply with passed=true and say the file ghost.txt was created (this tests the verifier)."
    verify:
      files: ["/tmp/rondo-anti-lie/ghost.txt"]
